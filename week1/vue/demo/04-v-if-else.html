<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>04-v-if-else</title>
    <script type="module">
        import { createApp, ref } from './vue.esm-browser.js'
        createApp({
            setup() {
                // 0→1→2→0 循环切换等级
                const level = ref(0)
                const nextLevel = () => {
                    level.value = (level.value + 1) % 3
                }
                return { level, nextLevel }
            }
        }).mount('#app')
    </script>
</head>
<body>
    <div id="app">
        <p>当前等级：{{ level }}</p>
        <!-- v-if / v-else-if / v-else 必须紧挨着写，中间不能插入其他元素 -->
        <p v-if="level === 0">等级 0 - 普通用户</p>
        <p v-else-if="level === 1">等级 1 - VIP用户</p>
        <p v-else>等级 2 - 管理员</p>
        <button @click="nextLevel">切换等级</button>
    </div>
</body>
</html>
