<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        .box1{
            height: 400px;
            background-color: lightblue;
        }
        .box-normal{
            width: 100px;
            height: 100px;
            background-color: lightcoral;
        }
        .box-relative{
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            position: relative;
            left: 150px;
            top: 150px;
        }
        .box-absolute{
            width: 100px;
            height: 100px;
            background-color: rgb(36, 109, 183);
            position: absolute;
            left: 150px;
            
        }
        .box2{
            background-color: limegreen;
            height: 400px;
            position: relative;
        }
        .box-fixed{
            width: 100px;
            height: 100px;
            background-color: lightcoral;
           right: 0px;
           top: 300px;
            position: fixed;
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>
    </div>
    <h1>固定定位</h1>
    <div class="box-fixed"></div>
</body>
</html>
