<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS导入方式</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        p{
            color: rgb(10, 10, 241);
            font-size: 26px;
            
        }
       h3{
            color: red;
            font-size: 24px;
        }
    </style>
    
</head>
<body>
    <p>这是一个应用了CSS的段落。</p>
    <h1 style="color: aqua;font-size: 18px;">这是一个一级标题内联样式css</h1>
    <h2 style="color: green;font-size: 20px;">这是一个二级标题内联样式css</h2>
    <h3>这是一个外部样式</h3>
    <h2>这是一个二级标题</h2>
    <p>这是一个段落。</p>
</body>
</html>
