<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 选择器</title>
    <style>
        /* 元素选择器，选中所有h1元素，设置文本颜色和字体大小 */
        h1{
            color: blue;
            font-size: 32px;
        }
        h2{
            color: green;
            font-size: 28px;
        }
        /* 类选择器，选中所有具有highlight类的元素，设置背景颜色 */
        .highlight{
            background-color: yellow;
        }
        /* ID选择器，选中具有特定ID的元素，设置文本颜色和字体大小 */
        #header{
            color: purple;
            font-size: 24px;
        }
        /* 通配选择器，选中所有元素，设置全局字体 */
        *{
            font-family: "KaiTi", sans-serif;
            font-weight: bold;
        }
        /* 子元素选择器，选中父元素下的直接子元素，设置文本颜色和字体大小 */
        .father>.son{
            color: red;
            font-size: 20px;
        }
        /* 后代选择器，选中父元素下的所有p元素，设置文本颜色和字体大小 */
        .father p{
            color: blue;
            font-size: 18px;
        }
        /* 相邻兄弟选择器，选中紧接在h3后面的p元素，设置背景颜色和字体大小 */
        h3 + p{
            background-color: orange;
            font-size: 18px;
        }
        /* 伪类选择器，选中具有特定状态的元素，设置文本颜色和字体大小 */
        .ele:hover{
            color: red;
            
        }
            
    </style>
</head>
<body>
    <h1>CSS 选择器</h1>
    <h2>元素选择器</h2>
    <h3 class="highlight">类选择器示例</h3>
    <h3>另一个示例</h3>
    <h4 id="header">ID选择器示例</h4>
    <div class="father">父元素
        <p class="son">子元素</p>
        <div>
            <p class="grandson">后代选择器示例</p>
        </div>
    </div>
    <p>普通的p标签</p>
    <h3>相邻的兄弟选择器示例</h3>
    <p>相邻的兄弟元素</p>

    <h3 class="ele">伪类选择器示例</h3>
</body>
</html>
